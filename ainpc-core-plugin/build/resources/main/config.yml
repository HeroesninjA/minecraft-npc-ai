# ========================================
# AI NPC Plugin - Configurare
# ========================================

# Setari OpenAI
openai:
  # Endpointul runtime folosit de pluginul AINPC.
  # Nu folosi aici endpoint-ul local al editorului/Codex (ex: localhost:3000),
  # ca sa nu amesteci traficul de dezvoltare cu traficul pluginului.
  base_url: "https://api.openai.com/v1"
  # Cheia API pentru runtime plugin. Recomandat prin variabila de mediu OPENAI_API_KEY.
  # Evita commit cu cheia in config.
  api_key: ""
  # Modelul nano recomandat pentru cost si latenta.
  model: "gpt-5.4-nano"
  # Timp maxim pentru conectare la OpenAI API.
  connect_timeout: 10
  # Timp maxim de asteptare pentru generarea raspunsului.
  read_timeout: 120
  # Timp maxim de trimitere a request-ului.
  write_timeout: 30
  # Temperatura (0.0-1.0, mai mare = mai creativ).
  temperature: 0.7
  # Numar maxim de tokeni in raspunsul vizibil.
  max_output_tokens: 150
  # Daca e false, raspunsurile nu sunt stocate de OpenAI din acest request.
  store: false
  # Cand API-ul da erori de conectare/autentificare, pluginul asteapta cateva secunde inainte sa incerce din nou.
  offline_retry_seconds: 15
  diagnostics:
    # Loguri detaliate pentru conectare, coduri HTTP, timing si modelul configurat.
    enabled: true
    # Ruleaza automat o verificare a modelului la startup si la reload.
    # Lasa false pe servere fara OPENAI_API_KEY ca startup-ul sa ramana curat si sa foloseasca fallback local.
    check_on_startup: false
    # Logheaza sumarul promptului trimis spre model.
    log_prompt_summary: true
    # Logheaza un preview din raspunsul returnat de model.
    log_response_preview: true

# Orchestrare AI peste mecanici. Dezactivat implicit pana cand validatorii si routerele sunt mature.
ai:
  orchestration:
    enabled: false

# Continut demo livrat de core. Core-ul trebuie sa ramana neutru; aceste setari
# permit oprirea continutului demo cand un addon real preia scenariul/story-ul.
demo:
  enabled: false

# Switch-uri globale pentru functii majore. Cand o functie este false, comenzile
# publice trebuie sa raspunda explicit ca zona este dezactivata.
features:
  gui: true
  quest: true
  progression: true
  story: true
  mapping: true
  routine: false
  simulation: false
  ai: true
  generation: false

# Setari spawn si jurnalizare batch
spawn:
  batches:
    # Daca este activ, dry-run-ul pentru household/settlement este scris in spawn_batches separat de batch-urile reale.
    track_dry_runs: false

# Setari platforma
platform:
  # standalone | hybrid | advanced
  runtime_mode: "standalone"
  # static | finite_dynamic | open_dynamic
  world_mode: "finite_dynamic"
  # static | evolutive | rotative
  default_story_mode: "evolutive"

# Setari universale pentru addonuri. Continutul specific unui addon sta in
# plugins/AINPC/addons/<addon-id>/config.yml, nu in config-ul core.
addons:
  # Activeaza registrul de addonuri si integrarea cu pluginuri externe.
  enabled: true
  # Folderul standard pentru configuratiile per-addon.
  config_directory: "addons"
  # Daca este activ, descriptorii addonurilor sunt validati mai strict la startup/reload.
  strict_validation: true
  # Addonuri dezactivate explicit dupa ID.
  disabled: []
  # Ordine optionala de incarcare pentru addonuri care au dependinte functionale intre ele.
  load_order: []

# Setari universale pentru feature packs incarcate de core sau instalate de addonuri.
feature_packs:
  # Retinut pentru compatibilitate cu configuratii vechi. Core-ul nu mai livreaza
  # pack-uri tematice implicite; addonurile isi instaleaza propriul continut.
  install_defaults: false
  # Permite fallback-uri minimale din cod cand nu exista niciun pack incarcat.
  allow_builtin_fallbacks: true
  # Valideaza pack-urile la startup si reload.
  validate_on_startup: true
  # Daca este true, un pack invalid opreste incarcarea continutului dependent.
  fail_invalid_pack: false
  # Permite pack-uri instalate sub packs/addons/<addon-id>/.
  allow_addon_packs: true
  # Verifica metadata addon/capabilities declarate in pack.
  validate_addon_metadata: true

# Setari NPC
npc:
  # Distanta maxima de interactiune (blocuri)
  interaction_distance: 5
  # Daca este activ, NPC-urile pastreaza AI vanilla pentru mers, usi si reactii naturale.
  natural_movement: true
  # Activeaza gravitatia pentru entitatile NPC.
  gravity: true
  # La startup si restaurare initiala, elimina entitatile AINPC live duplicate dupa npc_id/source_key.
  auto_cleanup_duplicate_entities: true
  # Daca este activ, NPC-urile au coliziune vanilla cu lumea si entitatile.
  collidable: true
  # Daca este false, NPC-urile pastreaza sunetele vanilla.
  silent: false
  # Protejeaza NPC-urile importante de damage accidental.
  invulnerable: true
  # Cooldown intre mesaje (secunde)
  message_cooldown: 2
  # Numarul maxim de amintiri pastrate per jucator
  max_memories_per_player: 50
  # Durata pana cand NPC-ul "uita" o amintire minora (zile)
  memory_decay_days: 30

# Simulare de viata
simulation:
  # Daca este activ, NPC-urile isi actualizeaza rutina si nevoile de baza periodic.
  enabled: false
  # La cate secunde ruleaza un tick de simulare.
  tick_seconds: 30
  needs:
    # Cu cat scaderea este mai mare, cu atat NPC-urile simt mai repede nevoia respectiva.
    hunger_decay: 1.5
    energy_decay: 1.2
    social_decay: 0.8
    comfort_decay: 0.6
    # Ritmul in care siguranta isi revine cand nu exista pericol.
    safety_recovery: 1.0

# Rutina zilnica
routine:
  # Daca este activ, NPC-urile folosesc home/work/social anchors ca tinta zilnica.
  enabled: false
  # La cate secunde se reevalueaza rutina.
  tick_seconds: 120
  # Teleportul ramane fallback pentru lumi diferite, distante mari sau pathfinding esuat.
  teleport_enabled: true
  natural_movement:
    # Daca este activ, rutina incearca intai pathfinding Paper, astfel NPC-ul merge natural spre ancora.
    enabled: true
    # Distanta maxima la care merita pathfinding direct; peste aceasta distanta se foloseste fallback-ul de teleport.
    max_distance: 48.0
    # Multiplicator viteza pathfinding. 1.0 este viteza vanilla.
    speed: 1.0
  # Daca NPC-ul este deja in raza tintei, nu este mutat.
  arrival_radius: 8.0
  # Distanta minima pentru teleport ca sa evitam miscari inutile.
  min_teleport_distance: 18.0
  # Cooldown minim intre mutari de rutina, in afara schimbarii clare de slot home/work/social.
  move_cooldown_seconds: 300
  # Daca NPC-ul ajunge foarte departe de ancora, rutina il poate corecta chiar daca e in cooldown.
  force_teleport_distance: 96.0

# Quest-urile fallback si preconfigurarile implicite sunt in quests.yml
quest:
  # Limite pentru questuri curente per jucator, pe categorii de runtime.
  max_active:
    main: 1
    side: 3
    repeatable: 2
  # La cate secunde se improspateaza busola, actionbar-ul si particulele pentru /quest track start.
  tracking_refresh_seconds: 5
  # Afiseaza particule directionale langa jucator si waypoint la tinta urmarita.
  tracking_particles: true
  # Distanta maxima la care se deseneaza waypoint-ul direct pe tinta. Sageata de langa jucator ramane activa.
  tracking_particle_range: 96

# Setari emotii
emotions:
  # Cat de repede se schimba emotiile (0.0-1.0)
  change_rate: 0.1
  # Emotia se intoarce la neutral dupa X minute
  decay_minutes: 60
  # Afiseaza particulele emotionale
  show_particles: true

# Setari dialog
dialog:
  # Limba pentru raspunsuri
  language: "ro"
  # Prefixul mesajelor NPC in chat
  prefix: "&6[NPC] &e"
  # Afiseaza numele NPC-ului
  show_name: true
  # Permite raspunsuri cu voce (text-to-speech, necesita setup extern)
  voice_enabled: false
  # Daca e activ, NPC-urile pot raspunde si fara click, pe baza de proximitate.
  # Dezactivat implicit ca interactiunile automate sa fie opt-in.
  passive_listen_enabled: false
  # Distanta maxima la care NPC-ul poate "auzi" chat-ul jucatorului
  passive_listen_radius: 8
  # Daca jucatorul este foarte aproape, cel mai apropiat NPC poate intra natural in dialog
  auto_engage_radius: 4

# Setari familie
family:
  # Permite NPC-urilor sa formeze familii automat
  auto_generate: false
  # Sansa de a avea sot/sotie (%)
  spouse_chance: 60
  # Numar maxim de copii
  max_children: 4
  # Sansa de a avea parinti in viata (%)
  living_parents_chance: 40

# Setari villageri naturali
villagers:
  auto_repopulate:
    # Daca este activ, pluginul mentine satele populate cu villageri noi atunci cand exista suficiente paturi.
    enabled: false
    # Populatia minima pe care pluginul incearca sa o mentina intr-un sat activ.
    min_population: 6
    # Nu depaseste niciodata acest prag prin repopulare automata.
    max_population: 12
    # Cati villageri maxim pot fi generati intr-un singur ciclu.
    max_new_per_cycle: 2
    # Raza in care sunt cautate paturile si villagerii din jurul centrului satului.
    scan_radius: 24
    vertical_radius: 8
    # Cooldown intre doua cicluri de repopulare pentru acelasi sat.
    cooldown_seconds: 180

# Setari baza de date
database:
  # Tipul bazei de date: sqlite | mysql.
  # SQLite ramane default local. MySQL/HikariCP este pentru productie si trebuie activat explicit.
  type: "sqlite"
  # Numele fisierului SQLite. Cheia veche database.filename este pastrata pentru compatibilitate.
  filename: "ainpc_data.db"
  sqlite:
    filename: "ainpc_data.db"
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "ainpc"
    username: "ainpc"
    password: ""
    # Recomandat pentru productie: seteaza parola in environment si lasa password gol.
    password_env: "AINPC_MYSQL_PASSWORD"
    use_ssl: false
    allow_public_key_retrieval: true
    pool:
      maximum_pool_size: 10
      minimum_idle: 1
      connection_timeout_ms: 30000
      idle_timeout_ms: 600000
      max_lifetime_ms: 1800000

# World Admin
world_admin:
  enabled: true
  auto_index:
    # Daca este activ, mapping-ul construieste automat un index intern pe chunk-uri pentru cautari rapide dupa locatie.
    # Daca este dezactivat, sistemul foloseste cautarea liniara peste regions/places.
    enabled: true
  # Regiunile, places si nodurile sunt definite manual pentru harti preconstruite.
  regions: {}

# Mesaje personalizate
messages:
  no_permission: "&cNu ai permisiunea sa faci asta!"
  npc_created: "&aNPC-ul &e%name% &aa fost creat!"
  npc_deleted: "&cNPC-ul &e%name% &ca fost sters!"
  npc_not_found: "&cNPC-ul nu a fost gasit!"
  too_far: "&cEsti prea departe de NPC pentru a vorbi!"
  cooldown: "&cAsteapta putin inainte sa vorbesti din nou!"
  ai_error: "&cEroare la generarea raspunsului. Incearca din nou!"
  openai_unavailable: "&cServiciul OpenAI nu este disponibil sau nu este configurat corect."

# Debug
debug: false
