# ========================================
# Addon Scenario: Medieval Quest
# Primul scenariu principal livrat ca addon separat
# ========================================

id: medieval_quest
name: "Medieval Quest"
description: "Scenariu principal medieval orientat pe misiuni locale, relicve pierdute si intrigi de sat."
addon:
  type: "scenario"
  version: "1.0.0"
  primary_scenario: true
  runtime_modes: ["standalone", "hybrid", "advanced"]
  capabilities: ["traits", "professions", "dialogues", "scenarios", "progression"]
  dependencies: ["medieval", "social"]

traits:
  honorable:
    name: "Onorabil"
    description: "Isi respecta cuvantul si actioneaza cu demnitate."
    modifiers:
      action_scores:
        HELP: 18
        DEFEND: 14
        TRADE: -6
      emotions:
        trust: 0.2

  duty_bound:
    name: "Datornic"
    description: "Pune datoria fata de sat si ordine mai presus de confort."
    modifiers:
      action_scores:
        PATROL: 25
        DEFEND: 18
        REST: -10
      emotions:
        anticipation: 0.15

  cunning:
    name: "Siret"
    description: "Gaseste mereu o ruta ascunsa sau o schema avantajoasa."
    modifiers:
      action_scores:
        INVESTIGATE: 18
        TRADE: 12
        GOSSIP: 10
      emotions:
        trust: -0.1

  devout:
    name: "Cucernic"
    description: "Cauta sens in semne, relicve si ritualuri vechi."
    modifiers:
      action_scores:
        WARN: 12
        HELP: 14
        TELL_STORY: 18
      emotions:
        trust: 0.1

professions:
  blacksmith:
    name: "Fierar"
    description: "Faureste arme, potcoave si piese necesare pentru orice expeditie."
    aliases:
      - "fierar"
      - "blacksmith"
      - "armorer"
    suggested_traits:
      - "hardworking"
      - "honorable"
      - "brave"
    work_locations:
      - "forja"
      - "atelier"
    tools:
      - "ciocan"
      - "nicovala"
      - "clesti"
    dialogues:
      - "Nu pleci intr-o misiune serioasa fara fier bun."
      - "Daca relicva e reala, o sa ai nevoie de otel pe masura."

  guard:
    name: "Garda"
    description: "Vegheaza satul, escorteaza drumurile si raspunde la pericole."
    aliases:
      - "guard"
      - "soldat"
      - "garda"
    suggested_traits:
      - "duty_bound"
      - "brave"
      - "loyal"
    work_locations:
      - "poarta"
      - "turn de veghe"
      - "drumul de iesire"
    tools:
      - "sabie"
      - "scut"
      - "lancie"
    dialogues:
      - "Drumul spre nord nu mai e sigur dupa lasarea serii."
      - "Daca pleci dupa relicva, macar spune cuiva incotro mergi."

  innkeeper:
    name: "Hangiu"
    description: "Asculta zvonuri, aduna calatori si stie ce lipseste satului."
    aliases:
      - "hangiu"
      - "innkeeper"
      - "hangiul"
    suggested_traits:
      - "friendly"
      - "gossiper"
      - "charismatic"
    work_locations:
      - "han"
      - "bucatarie"
      - "sala mare"
    tools:
      - "halba"
      - "chei"
      - "registru"
    dialogues:
      - "Toate zvonurile bune trec mai intai pe la han."
      - "Calatorii au vorbit iar despre o cripta uitata la marginea dealurilor."

  healer:
    name: "Vindecator"
    description: "Pregateste leacuri, potoli rani si citeste semnele naturii."
    aliases:
      - "vindecator"
      - "healer"
      - "alchimist"
    suggested_traits:
      - "wise"
      - "empathetic"
      - "devout"
    work_locations:
      - "coliba"
      - "gradina de ierburi"
      - "marginea padurii"
    tools:
      - "mojar"
      - "ierburi uscate"
      - "fiole"
    dialogues:
      - "Relicvele vechi nu aduc doar aur, uneori aduc si blesteme."
      - "Ia leacul asta daca te intorci prin mlastini sau ruine."

  priest:
    name: "Preot"
    description: "Pazeste traditiile si cunoaste legendele relicvelor sacre."
    aliases:
      - "preot"
      - "cleric"
      - "priest"
    suggested_traits:
      - "wise"
      - "devout"
      - "honorable"
    work_locations:
      - "biserica"
      - "capela"
      - "cripta"
    tools:
      - "carte sfanta"
      - "lumanare"
      - "sigiliu"
    dialogues:
      - "Nu orice relicva trebuie scoasa din locul ei."
      - "Unii cauta comoara, dar putini inteleg pretul ei."

  merchant:
    name: "Negustor"
    description: "Cumpara, vinde si finanteaza expeditii daca vede profit."
    aliases:
      - "negustor"
      - "merchant"
    suggested_traits:
      - "charismatic"
      - "cunning"
      - "greedy"
    work_locations:
      - "piata"
      - "taraba"
      - "depozit"
    tools:
      - "balanta"
      - "punga de bani"
      - "registru"
    dialogues:
      - "Daca relicva exista, cineva va plati bine pentru ea."
      - "Nimeni nu risca fara un castig pe masura."

  farmer:
    name: "Fermier"
    description: "Tine satul in viata si observa primul orice schimbare din imprejurimi."
    aliases:
      - "fermier"
      - "farmer"
    suggested_traits:
      - "hardworking"
      - "friendly"
      - "loyal"
    work_locations:
      - "camp"
      - "hambar"
      - "grajd"
    tools:
      - "sapa"
      - "coasa"
      - "grebla"
    dialogues:
      - "Pamantul spune cand ceva e ingropat prea adanc."
      - "Animalele se agita de cate ori cineva se apropie de dealul vechi."

dialogues:
  quest_hooks:
    - "Fierarul cauta pe cineva care sa-i aduca materiale pentru o sabie buna."
    - "Daca vrei de lucru, treci pe la forja. Fierarul are nevoie de ajutor."
    - "Prin sat se spune ca fierarul pregateste o prima misiune pentru un ucenic curajos."
    - "Fermierul strange provizii pentru hambar inainte sa vina noaptea."
    - "Garda promite rasplata celui care curata drumul de strigoi."
    - "Hangiul cauta mancare pentru calatorii blocati in sat."
    - "Vindecatorul are nevoie de ierburi pentru leacuri de urgenta."

mechanics:
  main_quests:
    kind: "quest"
    label: "Questuri principale"
    singular_label: "quest"
    plural_label: "questuri"
    progress: true
    max_active: 1

  side_quests:
    kind: "quest"
    label: "Questuri secundare"
    singular_label: "quest"
    plural_label: "questuri"
    progress: true
    max_active: 3

  village_contracts:
    kind: "contract"
    label: "Contracte locale"
    singular_label: "contract"
    plural_label: "contracte"
    progress: true
    max_active: 3

scenarios:
  Q01:
    name: "Quest Beginer"
    description: "Fierarul din sat ii ofera jucatorului prima misiune: sa aduca 3 lingouri de fier si o scandura din lemn pentru a primi o sabie."
    base_type: "QUEST"
    mechanic: "main_quests"
    trigger_probability: 0.12
    min_npcs: 1
    requires_player: true
    replace_base_type: true
    hint: "Fierarul te priveste atent, ca si cum ar avea de oferit o prima misiune."
    preferred_topologies:
      - "village_center"
      - "interior"
    narrative_hints:
      - "este o misiune simpla de inceput, data direct de fierar"
      - "obiectivul este sa aduci 3 lingouri de fier si scandura din lemn"
      - "recompensa finala este o sabie oferita de fierar"
    phases:
      INTRODUCTION: "Fierarul explica ce materiale ii lipsesc."
      ACCEPTANCE: "Jucatorul accepta cererea si porneste sa stranga materialele."
      GATHERING: "Jucatorul strange cele 3 lingouri de fier si scandura."
      RETURN: "Jucatorul revine la fierar cu materialele cerute."
      COMPLETION: "Fierarul faureste si ofera sabia ca recompensa."
    quest:
      code: "Q01"
      giver_profession: "blacksmith"
      kind: "fetch"
      category: "main"
      acceptance_mode: "explicit"
      completion_mode: "return_to_giver"
      tracking_mode: "next_objective"
      tags: ["starter", "crafting", "materials"]
      dialogues:
        offer:
          - "Am nevoie de fier bun si de o scandura uscata. Daca ma ajuti, iti fac o sabie pe masura."
        offered:
          - "Hotaraste-te: aduci materialele sau caut pe altcineva?"
        accepted:
          - "Bun. Adu-mi lingourile si scandura, iar eu pregatesc nicovala."
        active:
          - "Inca astept fierul si lemnul. Fara ele nu pot fauri nimic."
        ready:
          - "Vad ca ai materialele. Adu-le aici si terminam treaba."
        completed:
          - "Sabia e gata. Ai muncit cinstit, asa ca poart-o cu grija."
        phase:
          GATHERING:
            - "Trei lingouri si o scandura, atat iti cer pentru prima lama."
      objectives:
        iron_ingots:
          type: "collect_item"
          item: "IRON_INGOT"
          amount: 3
          description: "Adu 3 lingouri de fier."
        wooden_plank:
          type: "collect_item"
          item: "OAK_PLANKS"
          amount: 1
          description: "Adu 1 scandura din lemn."
      rewards:
        iron_sword:
          type: "item"
          item: "IRON_SWORD"
          amount: 1
          description: "Primesti 1 sabie de fier."
    roles:
      QUEST_GIVER:
        description: "Fierarul care da prima misiune."
        required_professions:
          - "blacksmith"
        preferred_professions:
          - "blacksmith"
        preferred_traits:
          - "hardworking"
          - "honorable"
      HERO:
        description: "Jucatorul care accepta prima misiune."
        player_role: true
      HELPER:
        description: "Un localnic care poate indruma jucatorul spre resurse."
        optional: true
        preferred_professions:
          - "farmer"
          - "guard"
          - "merchant"
        preferred_traits:
          - "friendly"
          - "loyal"

  Q02:
    name: "Provizii Pentru Hambar"
    description: "Fermierul cere ajutor pentru strangerea unor provizii simple, ca satul sa aiba mancare pentru urmatoarele zile."
    base_type: "QUEST"
    mechanic: "side_quests"
    trigger_probability: 0.10
    min_npcs: 1
    requires_player: true
    hint: "Fermierul pare ingrijorat de hambar si de rezervele satului."
    preferred_topologies:
      - "village_center"
      - "farmland"
    narrative_hints:
      - "este o misiune de aprovizionare data de fermier"
      - "obiectivul este sa aduci grau si morcovi pentru hambar"
      - "recompensa este mancare pentru drum"
    phases:
      INTRODUCTION: "Fermierul explica de ce hambarul trebuie completat."
      ACCEPTANCE: "Jucatorul accepta sa ajute la strangerea proviziilor."
      GATHERING: "Jucatorul strange grau si morcovi."
      RETURN: "Jucatorul revine la fermier cu proviziile."
      COMPLETION: "Fermierul multumeste si ofera mancare pentru drum."
    quest:
      code: "Q02"
      giver_profession: "farmer"
      kind: "fetch"
      category: "side"
      acceptance_mode: "explicit"
      completion_mode: "return_to_giver"
      tracking_mode: "next_objective"
      tags: ["village_support", "supplies"]
      dialogues:
        offer:
          - "Hambarul e prea gol. Imi trebuie grau si morcovi inainte sa cada seara."
        offered:
          - "Daca poti ajuta satul cu provizii, spune-mi acum."
        accepted:
          - "Multumesc. Fiecare snop si fiecare morcov conteaza."
        active:
          - "Mai avem nevoie de provizii. Verifica hambarele si campurile."
        ready:
          - "Ai strans ce trebuie. Adu proviziile la mine."
        completed:
          - "Hambarul respira din nou. Ia painea asta pentru drum."
      objectives:
        wheat_bundle:
          type: "collect_item"
          item: "WHEAT"
          amount: 8
          description: "Adu 8 fire de grau."
        carrots:
          type: "collect_item"
          item: "CARROT"
          amount: 4
          description: "Adu 4 morcovi."
      rewards:
        bread:
          type: "item"
          item: "BREAD"
          amount: 4
          description: "Primesti 4 paini."
    roles:
      QUEST_GIVER:
        description: "Fermierul care strange provizii pentru sat."
        required_professions:
          - "farmer"
        preferred_professions:
          - "farmer"
        preferred_traits:
          - "hardworking"
          - "friendly"
      HERO:
        description: "Jucatorul care ajuta la aprovizionare."
        player_role: true

  Q03:
    name: "Drumul Nesigur"
    description: "Garda satului cere ajutor pentru a elimina creaturile care ameninta drumul de langa asezare."
    base_type: "QUEST"
    mechanic: "side_quests"
    trigger_probability: 0.08
    min_npcs: 1
    requires_player: true
    hint: "Garda tine mana pe manerul sabiei si urmareste drumul din afara satului."
    preferred_topologies:
      - "village_edge"
      - "road"
    narrative_hints:
      - "este o misiune de aparare data de garda satului"
      - "obiectivul este sa ucizi creaturi ostile"
      - "recompensa ajuta jucatorul sa supravietuiasca mai bine"
    phases:
      INTRODUCTION: "Garda descrie pericolul de pe drum."
      ACCEPTANCE: "Jucatorul accepta sa curete zona."
      HUNTING: "Jucatorul cauta si invinge creaturile ostile."
      RETURN: "Jucatorul revine la garda cu drumul curatat."
      COMPLETION: "Garda confirma ca satul este mai sigur."
    quest:
      code: "Q03"
      giver_profession: "guard"
      kind: "hunt"
      category: "side"
      acceptance_mode: "explicit"
      completion_mode: "return_to_giver"
      tracking_mode: "next_objective"
      tags: ["combat", "road_safety"]
      prerequisites:
        - "Q01"
      dialogues:
        offer:
          - "Acum ca ai o lama decenta, drumul de langa sat trebuie curatat."
        unavailable:
          - "Nu trimit pe nimeni pe drum fara pregatire. Intai ajuta fierarul."
        offered:
          - "Accepti patrula sau lasi drumul in mana strigoilor?"
        accepted:
          - "Tine ochii deschisi. Zombie si scheletele nu vin niciodata singure."
        active:
          - "Drumul inca nu e sigur. Intoarce-te dupa ce amenintarea e taiata din radacina."
        ready:
          - "Ai curatat drumul? Raporteaza, vreau sa aud tot."
        completed:
          - "Satul poate respira mai usor. Scutul asta ti se cuvine."
      objectives:
        zombies:
          type: "kill_mob"
          item: "ZOMBIE"
          amount: 2
          description: "Ucide 2 zombie."
        skeleton:
          type: "kill_mob"
          item: "SKELETON"
          amount: 1
          description: "Ucide 1 schelet."
      rewards:
        shield:
          type: "item"
          item: "SHIELD"
          amount: 1
          description: "Primesti 1 scut."
    roles:
      QUEST_GIVER:
        description: "Garda care protejeaza drumul satului."
        required_professions:
          - "guard"
        preferred_professions:
          - "guard"
        preferred_traits:
          - "duty_bound"
          - "brave"
      HERO:
        description: "Jucatorul care curata drumul."
        player_role: true

  Q04:
    name: "Masa Calatorilor"
    description: "Hangiul are clienti blocati in sat si are nevoie de provizii pregatite rapid."
    base_type: "QUEST"
    mechanic: "side_quests"
    trigger_probability: 0.09
    min_npcs: 1
    requires_player: true
    hint: "Hangiul numara portiile ramase si priveste nelinistit spre sala mare."
    preferred_topologies:
      - "inn"
      - "village_center"
    narrative_hints:
      - "este o misiune de aprovizionare data de hangiu"
      - "obiectivul este sa aduci mancare gata pentru calatori"
      - "recompensa este mica, dar utila pentru economie"
    phases:
      INTRODUCTION: "Hangiul explica lipsa de mancare pentru oaspeti."
      ACCEPTANCE: "Jucatorul accepta sa aduca provizii."
      GATHERING: "Jucatorul strange mancare pentru han."
      RETURN: "Jucatorul revine la hangiu."
      COMPLETION: "Hangiul serveste calatorii si plateste ajutorul."
    quest:
      code: "Q04"
      giver_profession: "innkeeper"
      kind: "fetch"
      category: "repeatable"
      acceptance_mode: "explicit"
      completion_mode: "return_to_giver"
      tracking_mode: "next_objective"
      tags: ["repeatable", "inn", "food"]
      repeatable: true
      cooldown_seconds: 1800
      dialogues:
        offer:
          - "Calatorii cer masa calda, iar camara mea scartaie. Adu paine si carne."
        unavailable:
          - "Deocamdata am destul pentru mese. Revino cand se golesc blidele."
        offered:
          - "Bucataria asteapta raspunsul tau. Ma ajuti sau inchid sala?"
        accepted:
          - "Bine. Tine mancarea curata si adu-o repede la han."
        active:
          - "Oaspetii intreaba deja de cina. Mai ai de adus provizii."
        ready:
          - "Miroase a mancare buna. Adu proviziile la tejghea."
        completed:
          - "Ai salvat seara calatorilor. Uite plata pentru ajutor."
      objectives:
        bread:
          type: "collect_item"
          item: "BREAD"
          amount: 3
          description: "Adu 3 paini."
        cooked_beef:
          type: "collect_item"
          item: "COOKED_BEEF"
          amount: 2
          description: "Adu 2 fripturi."
      rewards:
        emeralds:
          type: "item"
          item: "EMERALD"
          amount: 2
          description: "Primesti 2 smaralde."
    roles:
      QUEST_GIVER:
        description: "Hangiul care pregateste masa calatorilor."
        required_professions:
          - "innkeeper"
        preferred_professions:
          - "innkeeper"
        preferred_traits:
          - "friendly"
          - "charismatic"
      HERO:
        description: "Jucatorul care aduce provizii pentru han."
        player_role: true

  Q05:
    name: "Leac Pentru Rani"
    description: "Vindecatorul pregateste leacuri pentru sat si cere ingrediente simple din imprejurimi."
    base_type: "QUEST"
    mechanic: "side_quests"
    trigger_probability: 0.09
    min_npcs: 1
    requires_player: true
    hint: "Vindecatorul verifica rafturile si pare sa aiba nevoie de ingrediente proaspete."
    preferred_topologies:
      - "forest_edge"
      - "village_center"
    narrative_hints:
      - "este o misiune de cules ingrediente data de vindecator"
      - "obiectivul este sa aduci ciuperci, papadii si miere"
      - "recompensa este o gustare buna pentru drum"
    phases:
      INTRODUCTION: "Vindecatorul explica ce ingrediente lipsesc."
      ACCEPTANCE: "Jucatorul accepta sa adune ingredientele."
      GATHERING: "Jucatorul strange plante si miere."
      RETURN: "Jucatorul revine la vindecator cu ingredientele."
      COMPLETION: "Vindecatorul pregateste leacul si ofera rasplata."
    quest:
      code: "Q05"
      giver_profession: "healer"
      kind: "fetch"
      category: "side"
      acceptance_mode: "explicit"
      completion_mode: "return_to_giver"
      tracking_mode: "next_objective"
      tags: ["healing", "ingredients"]
      prerequisites:
        - "Q02"
      dialogues:
        offer:
          - "Am raniti de ingrijit si rafturile sunt goale. Imi trebuie plante si miere."
        unavailable:
          - "Mai intai ajuta satul cu provizii. Leacurile nu tin loc de foame."
        offered:
          - "Daca ai mana usoara pentru cules, spune-mi ca pornesti."
        accepted:
          - "Cauta ciuperci rosii, papadii si o sticla cu miere. Nu risipi nimic."
        active:
          - "Leacurile asteapta ingredientele. Padurea si stupii sunt cea mai buna sansa."
        ready:
          - "Ai adus tot? Pune ingredientele pe masa de lucru."
        completed:
          - "Leacul e gata. Ia morcovii astia aurii, iti vor prinde bine."
      objectives:
        mushrooms:
          type: "collect_item"
          item: "RED_MUSHROOM"
          amount: 2
          description: "Adu 2 ciuperci rosii."
        flowers:
          type: "collect_item"
          item: "DANDELION"
          amount: 3
          description: "Adu 3 papadii."
        honey:
          type: "collect_item"
          item: "HONEY_BOTTLE"
          amount: 1
          description: "Adu 1 sticla cu miere."
      rewards:
        golden_carrot:
          type: "item"
          item: "GOLDEN_CARROT"
          amount: 2
          description: "Primesti 2 morcovi aurii."
    roles:
      QUEST_GIVER:
        description: "Vindecatorul care pregateste leacuri pentru sat."
        required_professions:
          - "healer"
        preferred_professions:
          - "healer"
        preferred_traits:
          - "wise"
          - "empathetic"
      HERO:
        description: "Jucatorul care aduna ingredientele."
        player_role: true

  Q06:
    name: "Urme La Forja"
    description: "Fierarul observa semne ciudate in forja si cere jucatorului sa verifice locul inainte ca munca satului sa fie afectata."
    base_type: "QUEST"
    mechanic: "side_quests"
    trigger_probability: 0.07
    min_npcs: 1
    requires_player: true
    hint: "Fierarul priveste spre forja ca si cum ceva nu este la locul lui."
    preferred_topologies:
      - "village_center"
      - "interior"
    narrative_hints:
      - "este prima misiune medievala legata direct de mapping semantic"
      - "jucatorul trebuie sa ajunga la fierarie si sa inspecteze un node de investigatie"
      - "finalizarea scrie un story event local pentru forja"
    phases:
      INTRODUCTION: "Fierarul explica urmele suspecte din forja."
      ACCEPTANCE: "Jucatorul accepta sa verifice locul."
      INVESTIGATION: "Jucatorul merge la forja si inspecteaza punctul suspect."
      RETURN: "Jucatorul revine la fierar cu observatiile."
      COMPLETION: "Fierarul noteaza ce s-a intamplat si pregateste urmatorii pasi."
    quest:
      code: "Q06"
      giver_profession: "blacksmith"
      kind: "exploration"
      category: "side"
      acceptance_mode: "explicit"
      completion_mode: "return_to_giver"
      tracking_mode: "next_objective"
      tags: ["mapping", "investigation", "forge", "story"]
      prerequisites:
        - "Q01"
      dialogues:
        offer:
          - "Dupa ce m-ai ajutat cu materialele, am nevoie de ochi buni. In forja au aparut urme pe care nu le recunosc."
        unavailable:
          - "Intai trebuie sa stiu ca pot avea incredere in tine. Ajuta-ma cu materialele pentru prima lama."
        offered:
          - "Verifici forja sau lasam semnele astea sa se adanceasca?"
        accepted:
          - "Mergi la forja, cauta punctul suspect si intoarce-te la mine cu ce ai vazut."
        active:
